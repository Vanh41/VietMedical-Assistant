<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VietMedical Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="font-['Inter'] h-screen w-screen overflow-hidden text-white">
    <div id="bg-layer" 
         class="absolute inset-0 bg-cover bg-center transition-all duration-1000 ease-in-out"
         style="background-image: url('{{ url_for('static', path='/images/background.jpg') }}');">
        <div id="bg-overlay" class="absolute inset-0 bg-black/30 transition-all duration-1000"></div>
    </div>
    <div id="welcome-screen" class="relative z-10 flex flex-col items-center justify-center h-full px-4 text-center">
        <div class="animate-fade-in-up space-y-6">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter drop-shadow-lg">
                VietMedical <span class="text-teal-400">AI Assistant</span>
            </h1>
            <p class="text-lg md:text-2xl text-gray-200 font-light max-w-2xl mx-auto drop-shadow-md">
                Trợ lý sức khỏe thông minh
            </p>
            <button id="start-btn" class="group mt-8 px-10 py-4 border border-white/50 hover:bg-white/10 rounded-full backdrop-blur-sm transition-all duration-300 hover:scale-105">
                <span class="text-xl font-medium tracking-wide">Bắt đầu trò chuyện</span>
                <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>
    </div>
    <div id="chat-interface" class="hidden absolute inset-0 z-20 flex items-center justify-center opacity-0 transition-opacity duration-700">
        <div class="w-full h-full md:w-[900px] md:h-[85vh] bg-white/10 backdrop-blur-xl md:rounded-3xl border border-white/20 shadow-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b border-white/10 flex items-center justify-between bg-black/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-teal-500/20 flex items-center justify-center border border-teal-400/30">
                        <i class="fa-solid fa-user-doctor text-teal-300"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">Bác sĩ AI</h3>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                            <span class="text-xs text-gray-300">Trực tuyến</span>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-white/50 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth">
                <div class="flex gap-4 animate-fade-in-up">
                    <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-robot text-sm"></i>
                    </div>
                    <div class="bg-white/10 border border-white/10 p-4 rounded-2xl rounded-tl-none text-gray-100 max-w-[85%]">
                        Chào bạn. Mình có thể giúp gì cho sức khỏe của bạn?
                    </div>
                </div>
            </div>
            <div class="p-5 bg-black/20 border-t border-white/10">
                <form id="chat-form" class="relative">
                    <input type="text" id="user-input" 
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-5 pr-12 text-white placeholder-gray-400 focus:outline-none focus:bg-white/10 focus:border-teal-400/50 transition"
                           placeholder="Nhập triệu chứng..." autocomplete="off">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-teal-400 hover:text-teal-300 transition">
                        <i class="fa-solid fa-paper-plane text-lg"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='/js/script.js') }}"></script>
</body>
</html>
